spring:
  application:
    name: 在线电影购票系统
  datasource:
    url: jdbc:mysql://${TIDB_HOST:localhost}:${TIDB_PORT:3306}/${TIDB_DB_NAME:movie_db}?useUnicode=true&serverTimezone=Asia/Shanghai
    username: ${TIDB_USER:root}
    password: ${TIDB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

file:
  upload-dir: ${user.dir}/movie_uploads

server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
